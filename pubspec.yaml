name: fitness_tracker
description: A complete mobile fitness tracker app with pose detection
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera and ML Kit
  camera: ^0.10.5
  google_mlkit_pose_detection: ^0.10.0
  
  # Voice
  flutter_tts: ^3.8.5
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  
  # State management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
